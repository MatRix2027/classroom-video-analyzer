# =====================================================
# 红线淘汰行为（适用于所有班型）
# =====================================================
red_lines:
  - id: RL001
    name: 严重伤害学员心理健康
    description: "教师的言语或语气，严重伤害和打击到学员的安全感、尊严、兴趣、自信等，引起学员强烈的负面情绪。包括侮辱、嘲讽、贬低、训斥和恶意对比学员等。"
    severity: elimination

  - id: RL002
    name: 不干预危险行为
    description: "老师未提醒干涉情况下，学生在屏幕前出现可能造成严重伤害的危险行为，例如吃剪刀、尝教具、在座椅上弹跳等。"
    severity: elimination

  - id: RL003
    name: 干扰正常教学
    description: "老师在上课过程中做明显与教学无关的事情，造成教师分神，影响正常教学的行为，如醉酒上课、课堂吸烟、身体离开屏幕、玩手机、进食、阅览其它网页、操作聊天软件等。"
    severity: elimination

  - id: RL004
    name: 教学严重错误
    description: "上课讲错重要解题方法和重点概念，导致课程内容严重偏离教学目标。"
    severity: elimination

  - id: RL005
    name: 违反教学环境布置要求
    description: "出现上课不穿规定工服，不使用指定的背景布（特殊情况除外）、无关人员、宠物或者杂乱声音等不适合课堂教学的内容。"
    severity: elimination

# 等级制定义（合格线75分）
grade_system:
  - name: 不合格
    min: 0
    max: 50
    color: red
  - name: 待改进
    min: 50
