# 课堂视频智能分析工具 — 评分标准配置（统一版）
# 默认使用 QC-v4.1 统一课中质检表（整合校准框架v1.0 + 所有班型标准精华）
# 4类目×10维度=100分，合格线75分
# 视觉维度：仪表教态(5分)、语言表达及板书设计(5分) → 视觉模型评分
# 保留L1-L3/L4-L6/L7-L9/QA-v3用于历史兼容

# 默认使用的班型配置（可通过 --level 参数覆盖）
default_level: "QC-v4"

# 分析参数
analysis:
  num_rounds: 1  # 质量评估轮数（≥1），多轮取均值减少LLM偏差，推荐3轮
  chunk_size: 2000
  chunk_overlap: 200
  prompt_version: "spark_standard"

# 各班型评分配置
levels:
  # =====================================================
  # L1-L3 学前班型（教学表现力权重最高40%）
  # =====================================================
  L1-L3:
    description: "学前班型，重点关注教学表现力和课堂互动"
    student_focus: "培养学习兴趣、以童心共情孩子"
    dimensions:
      - name: 知识传授
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "不仅让学生懂知识，还能让学生懂本质"
        criteria_good: "能举例形象化的讲清楚基础知识，但仅限指南内容"
        criteria_average: "根据指南按部就班的进行讲解"
        criteria_poor: "讲解混乱，知识点有误"

      - name: 重点难点
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "专攻要害，化难为趣，巧妙设计游戏，场景化教学"
        criteria_good: "知道哪里重要，但解法单一"
        criteria_average: "重难点不够清晰，简单内容重点讲，难点一句带过"
        criteria_poor: "无重点，知识罗列"

      - name: 启发引导
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "提问具有开放性和启发性，充分激发孩子的思考和创造力，鼓励孩子自主探索和发现"
        criteria_good: "提问有一部分是封闭性的，但也会穿插一些开放性问题"
        criteria_average: "提问比较封闭，多为'是'或'不是'、'对'或'错'类简单回答"
        criteria_poor: "无法激发学生思考，无法推动学生探究"

      - name: 教学灵活性
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "能够敏锐地识别学员的难点，并迅速调整教学策略，采用多样化的教学方法满足不同孩子的学习需求"
        criteria_good: "能够识别学员的一些常见难点，并尝试调整教学方法，但调整的方式比较有限"
        criteria_average: "不能准确识别学生的难点，只会反复强调知识点或操作步骤"
        criteria_poor: "教学僵化，完全无法根据学生情况调整"

      - name: 课堂互动
        category: 教学表现力
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "能够采取多种互动方式，设计趣味点，让孩子高效参与课堂，调动孩子积极性，满足孩子成就感"
        criteria_good: "能够有意识设计互动方式，让孩子参与课堂"
        criteria_average: "为了增加互动而互动，缺乏目的性和有效性"
        criteria_poor: "互动形式单一，无法调动学员参与状态"

      - name: 课堂节奏
        category: 教学表现力
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "能够精准地把控课堂节奏，创造性地运用各种教学方法，使课堂充满活力"
        criteria_good: "根据学生的反应灵活调整教学活动，课堂流畅度较高"
        criteria_average: "能够基本按指南时间轴进行授课，但把控较为生硬"
        criteria_poor: "节奏把控混乱，时间分配不均，环节衔接不畅"

      - name: 语言表达
        category: 教学表现力
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "语言生动鲜活，善于启发学生思维和表达，让学生有沉浸式的课堂体验"
        criteria_good: "表达流畅有条理，语言具有鼓动性和感染力，符合学前孩子的认知特点"
        criteria_average: "语言表达清楚，表达规范，感染力中规中矩"
        criteria_poor: "语言平淡，表达不清，缺乏感染力"

      - name: 关注激励
        category: 教学表现力
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "能结合学生的表情、状态等做出预判，立刻给予关注；热情且真诚地给予学生反馈"
        criteria_good: "能照顾到多数学生，用游戏等方式让全班轮流发言；有固定激励套路"
        criteria_average: "能注意到不同学生，但容易集中关注程度较弱学员；激励形式单一"
        criteria_poor: "缺少对学生的热情反馈，正向反馈不足"

      - name: 学习效果
        category: 课堂教学效果
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "学生不仅掌握核心知识，还能在课堂中产生迁移、应用与延伸；教师能结合自身的教学经验让学生在思维方法上得到成长"
        criteria_good: "教学目标达成度高，学生不仅能完成参数题目，还能表达清晰，能举一反三；教师能在讲解过程中渗透思维方法"
        criteria_average: "大部分学生能掌握教学目标，课堂练习基本达标；整堂课只有知识目标的达成，没有思维方法的体现"
        criteria_poor: "课堂练习未达标，对知识的理解严重不足"

      - name: 效果外化
        category: 课堂教学效果
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "具有强烈的课程效果外化意识，能够将教学内容与生活实际、校内其他学科进行有机融合，形成系统的知识体系"
        criteria_good: "有一定的课程效果外化意识，会偶尔提及所学知识与生活或校内其他学科的联系"
        criteria_average: "很少有课程效果外化的意识，只关注课堂内的教学内容和孩子当下的学习表现"
        criteria_poor: "无效果外化意识，仅关注课堂内容"

    quality_checklist:
      - "有无开场白和课堂纪律提醒"
      - "课堂互动是否有学生参与"
      - "是否有知识总结"
      - "有无不当言论"
      - "是否关注到每位学生"

  # =====================================================
  # L4-L6 小低班型（教学方法权重最高30%）
  # =====================================================
  L4-L6:
    description: "小低班型，重点关注教学方法和思维渗透"
    student_focus: "培养良好学习习惯、习得数学思维方法"
    dimensions:
      - name: 知识传授
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "完整覆盖知识点（解法延伸/本质挖掘）；突出授课内容的层次递进和理解的逻辑；有逻辑，知识讲解清晰准确"
        criteria_good: "完整讲授但拓展有限，部分课次尝试选讲；有逻辑性，知识讲解清晰准确"
        criteria_average: "按指南讲全知识点，无拓展；具备基础逻辑，但逻辑清晰度有待提升"
        criteria_poor: "照搬指南，讲解无逻辑，存在知识漏洞"

      - name: 重点难点
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "精准把握重难点，例题时间分配科学；重难点梳理清晰，知识拓展延伸准确且专业"
        criteria_good: "重难点突出但本质挖掘不足；有一定知识拓展和延伸举例"
        criteria_average: "知识点讲全但重难点不突出；缺少拓展和延伸，能完成基础教学目标"
        criteria_poor: "没有重点，只是知识内容罗列；无知识拓展，无法完成教学基础目标"

      - name: 启发引导
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "开放式提问，根据孩子情况引导探究，培养归纳总结能力；激发学生思考，课堂情绪高涨，学习氛围热烈"
        criteria_good: "依照指南话术完成关键提问，降级引导较为有效，部分为开放式提问；能够激发学生思考，方向准确"
        criteria_average: "依照指南话术完成关键提问，降级引导多为封闭式提问；有一定思考引导性，但有限，不熟练"
        criteria_poor: "依照指南完成主要提问，缺乏关键引导；无法激发学生思考，无法推动学生探究"

      - name: 教学灵活性
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "动态调整教学策略，快速解决个性化问题；功底优秀，灵活应对学生情况和教学问题"
        criteria_good: "能灵活应对常见问题，但复杂问题引导效率低；功底良好，相对灵活处理教学进度"
        criteria_average: "主要依靠固定话术，灵活性弱；能应对基础问题，引导机械；功底合格，教学调整度低"
        criteria_poor: "依赖固定话术，没有灵活性；常见问题无法应对，引导效率极低；无法根据学生情况调整教学"

      - name: 思维方法
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "引导过程注重思维方法渗透，注重方法提炼和迁移应用；能将解题技巧和思维方法、能力强耦合"
        criteria_good: "引导过程体现思维方法，但深度、广度不足；较高频的应用思维方法讲解"
        criteria_average: "仅完成基础解法讲解，引导过程无法体现思维方法；总结中有提炼或个别明显点涉及"
        criteria_poor: "无思维方法体现，只是说明概念；忽略思维方法讲解和渗透"

      - name: 课堂节奏
        category: 教学表现力
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "张弛有度，给孩子足够的思考时间和空间；驾驭参数，实时且针对性处理课堂情况和节奏"
        criteria_good: "按参数控制节奏，偶有紧迫感；结合学生理解情况可灵活处理参数"
        criteria_average: "节奏平铺直叙，缺乏变化；能按照基础参数完成教学"
        criteria_poor: "课堂节奏平铺直叙，完全无变化；无法按基础参数控制节奏，不能给学生留出思考时间；节奏把控混乱"

      - name: 数学表达能力
        category: 教学表现力
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "板书结构化，语言精准严谨；表达流畅应对自如，专业度和严谨性很高"
        criteria_good: "板书清晰，语言表达流畅且有较准确的拓展；表达流畅，具备较高专业度和严谨性"
        criteria_average: "板书基础，语言以复述指南为主；表达相对流畅，但专业度和严谨性有待提升"
        criteria_poor: "板书基础且不规范（如结构混乱、关键信息缺失）；语言表达以复述指南为主，无自主组织的流畅表述"

      - name: 关注互动
        category: 教学表现力
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "及时关注每个学生，持续追踪学生反应；互动有效，能个性化反馈；互动形式比较多样，能够正向反馈"
        criteria_good: "关注多数学生并互动，较全面的情绪激发和多样化关注；互动形式比较单一，缺少热情反馈，情绪波动不大"
        criteria_average: "能注意到不同学生，但容易集中关注程度较弱学员；缺少对学生的热情反馈，正向反馈不足"
        criteria_poor: "互动形式单一，缺乏多样性；无法有效激发学生情绪，互动程度弱"

      - name: 学习效果
        category: 课堂教学效果
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "学生掌握核心知识，还能在课堂中产生迁移、应用与延伸；能举一反三，拓展部分吸收较好"
        criteria_good: "掌握核心内容，能完成参数题目，学生表达清晰；能举一反三，拓展部分吸收较好"
        criteria_average: "学生能掌握教学目标，课堂练习基本达标，高阶理解不足；能完成基础题型，无法挑战难度题型"
        criteria_poor: "课堂练习未达标，对知识的理解严重不足；不能完成基础题目，无法举一反三"

      - name: 效果外化
        category: 课堂教学效果
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "课堂生成高质量学生笔记/思维导图；会引导孩子将所学知识应用到实际生活中；培养孩子的综合能力和解决问题的能力"
        criteria_good: "学生能整理常规笔记；有一定的课程效果外化意识；较常规提及所学知识与生活或校内其他学科的联系"
        criteria_average: "依赖教师提供的标准笔记；很少有课程效果外化的意识；主要关注课堂内的教学内容和孩子当下的学习表现"
        criteria_poor: "仅关注课堂内的教学内容和学生当下的学习表现；不提及所学知识与生活、校内其他学科的联系；无法引导学生将知识应用到实际场景"

    quality_checklist:
      - "有无开场白和课堂纪律提醒"
      - "是否按时上下课"
      - "互动环节是否有学生参与"
      - "是否有知识总结"
      - "有无不当言论"
      - "是否有思维方法渗透"

  # =====================================================
  # L7-L9 小高班型（教学内容+教学方法各30%）
  # =====================================================
  L7-L9:
    description: "小高班型，重点关注教学内容深度和教学方法灵活性"
    student_focus: "深化知识体系构建、掌握自主探究方法"
    dimensions:
      - name: 知识传授
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "完整覆盖知识点，从数学本质（思维、原理）讲解，拓展全面深入，关联多维度内容（如竞赛题、生活场景）"
        criteria_good: "完整覆盖知识点，对公式推导、题型变形做有限拓展，偶有讲解不透彻"
        criteria_average: "按指南完整覆盖知识点，对基础概念、公式讲解清晰，结合课件辅助理解，无额外拓展"
        criteria_poor: "知识点讲解不清，存在错误或遗漏"

      - name: 熟练程度
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "对本节课所有题目滚瓜烂熟，精准串联知识点解题，讲解行云流水"
        criteria_good: "对常规题型熟练把控，对挑战题很熟，讲复杂问题时就算偶尔断了思路，也能自己找回节奏继续讲明白"
        criteria_average: "对常规题型熟练把控，能顺畅讲解例题、练习，挑战题/变形题处理生涩"
        criteria_poor: "讲解不流畅，对基础题目也不熟练"

      - name: 重点难点
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "精准把握重难点，依照学情/题型动态分配时间，用创新设计突破难点"
        criteria_good: "重难点突出，配合举例剖析难点，但本质挖掘不足，学生难以举一反三"
        criteria_average: "能识别并基础讲解重难点，依赖指南解析思路，难点剖析浅显，难以深入本质"
        criteria_poor: "重难点不明确，讲解混乱"

      - name: 启发引导
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "依据学生反馈调整引导方向，鼓励自主质疑、探究，培养思维能力"
        criteria_good: "依照教案完成关键提问，部分为开放式问题，能引导学生思考，但开放式问题数量少、引导深度有限"
        criteria_average: "依照指南设置基础提问，经常出现'是不是''对不对'等封闭式问题，引导方向单一，给学生自主思考空间小"
        criteria_poor: "缺乏引导，完全灌输式教学"

      - name: 教学方法灵活应用
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "方法灵活多样，能根据学生差异快速调整讲法，教学效果明显"
        criteria_good: "能切换不同讲法（如图形化、模型化），但复杂问题应变策略有限"
        criteria_average: "依赖常规讲授法，遇学生理解偏差，调整方式单一（如重复讲解），难适配不同学习风格学生"
        criteria_poor: "教学方法僵化，完全无法调整"

      - name: 教学逻辑
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "思维方法讲得透彻，能拆解复杂题型，学生能模仿思路举一反三"
        criteria_good: "引导过程体现基础思维方法（如分类讨论、方程思想），但讲解深度、广度不足"
        criteria_average: "按部就班讲解解题步骤，仅关注答案对错，对解题思路形成、思维误区梳理不足"
        criteria_poor: "无逻辑可言，讲解混乱"

      - name: 关注互动
        category: 教学规范
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "实时关注每位学生状态，能根据反馈调整互动方式，给予个性化指导与情感支持，互动有效且多样"
        criteria_good: "关注多数学生并互动，不过对内向、基础极弱学生，激发参与度不足，互动形式较多样（问答、小组讨论），能正向反馈但深度不够"
        criteria_average: "能注意到不同学生，但易集中关注积极、基础好的，对沉默、基础弱学生关注少，互动形式单一（多为问答）"
        criteria_poor: "互动形式单一，缺乏多样性"

      - name: 语言表达及板书设计
        category: 教学规范
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "语言精准严谨又生动，具有感染力与启发性；板书结构化强，逻辑清晰、重点突出"
        criteria_good: "语言表达流畅有条理，偶有数学语言表达不精准，整体结构较清晰但感染力一般；板书清晰，条理较好"
        criteria_average: "语言表达流畅，偶有口误，感染力中规中矩；需要板书呈现时，无板书，或板书内容杂乱"
        criteria_poor: "语言表达不清，板书混乱或缺失"

      - name: 迁移应用
        category: 课堂教学效果
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "多数学生能完成拓展练习，具备较强的迁移与思考能力，面对综合难题有思考有想法"
        criteria_good: "多数学生能完成拓展练习，具备一定迁移能力，但面对综合难题仍显不足"
        criteria_average: "学生课堂练习正确率较高，但面对题型变式或新题时迁移能力较弱"
        criteria_poor: "课堂练习正确率低，无法迁移应用"

      - name: 效果外化
        category: 课堂教学效果
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "教师非常重视知识整理，课上会带着学生归纳、串联知识点；讲课过程中能自然连接到生活实际、其他学科、竞赛内容或以往知识"
        criteria_good: "教师能有意识引导学生规范整理知识要点，对重点内容进行归纳与适当分类；可以偶尔关联校内及奥数知识体系"
        criteria_average: "依赖指南标准笔记，仅口头提醒学生抄记，缺少逻辑梳理；很少有课程效果外化的意识"
        criteria_poor: "无效果外化意识，完全不关联其他知识"

    quality_checklist:
      - "有无开场白和课堂纪律提醒"
      - "是否按时上下课"
      - "互动环节是否有学生参与"
      - "是否有知识总结"
      - "有无不当言论"
      - "是否有思维方法渗透和迁移应用"

  # =====================================================
  # 综合评价标准 v5.0（通用版）
  # 整合 L1-L3/L4-L6/L7-L9/QC-v4.1/QA-v3 全部标准精华
  # 4类目×10维度=100分，合格线75分，全学段通用
  # 视觉维度：仪表教态、语言表达及板书设计 → 由视觉模型评分
  # 子维度评分：教学逻辑(主线清晰40%+教学弹性30%+思维尊重30%)
  #            关注公平(互动分布40%+反馈质量30%+沉默关怀30%)
  #            课堂效果(目标达成35%+课堂氛围35%+思维培养30%)
  # =====================================================
  QC-v4:
    description: "火花思维课堂教学质量综合评价标准v5.0（通用版），总分100分，合格线75分。整合L1-L3/L4-L6/L7-L9班型标准精华、KS投诉课校准经验、QA-v3质检标准。全学段通用，按班型自适应评分侧重。"
    student_focus: "教学质量全面保障——教学内容要深、教学方法要活、教学规范要严、教学效果要实"
    version: "v5.0-unified"
    calibration_version: "v1.0"

    # 评分纪律（注入Prompt强制执行）
    scoring_discipline:
      - "7分是及格线：良[7,9)意味着'达标但不出彩'，不是'好'。切勿因为转录文本看起来顺利就给高分。"
      - "优分必须稀缺：优[9,10]意味着'可作为培训素材的标杆级表现'，全课堂最多2-3个维度评优。"
      - "维度独立评分：各维度评分互不影响。不要因为整体印象好就抬高低分维度，各维度严格按自身标准独立评判。"
      - "扣分必须有证据：每个扣分点的scoring_points必须引用具体转录原文+精确时间戳，不可凭空扣分。"
      - "加分不能只看形式：有板书≠板书好，有互动≠互动有效，有总结≠总结到位。必须检验实质效果。"
      - "防止完成度偏差：老师把步骤讲完了≠教得好，要看每步的完成质量和学生吸收程度。"
      - "防止积极性偏差：LLM容易倾向给中上评分——必须严格逐条对照标准评分，不得整体感觉好就全给高分。"

    # 数学课专项评估（课程涉及数学/逻辑思维时自动激活）
    math_special_checks:
      - check: "概念本质挖掘"
        detail: "数学概念的本质是否讲透（'为什么'），还是只讲计算步骤（'怎么做'）。如果整堂课没有一次追问'为什么'，知识传授不得超8分。"
      - check: "解题逻辑链完整"
        detail: "解题推理过程是否完整，学生能否用自己的话复述推理路径。如果教师直接给答案跳过推理，教学逻辑不得超7分。"
      - check: "多角度突破难点"
        detail: "数学难点是否用≥2种方法/角度突破（如举例+反例+类比+操作）。只讲一种解法就过的，重点难点不得评优。"
      - check: "非预期解法接纳"
        detail: "学生提出非预期解法时，教师是接纳引导还是忽略/打断。如果忽略或打断，教学方式方法封顶良[7分]。"
      - check: "提问指向思维"
        detail: "教师的提问是指向数学思维（'怎么想的''为什么'），还是仅指向答案（'等于多少''对不对'）。封闭式问题占比超80%则启发引导相关维度扣分。"

    dimensions:
      # --- 第1类：教学内容（30分）---
      - name: 知识传授
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "内容丰富，信息量符合指南设计，阐述准确，能讲清数学/逻辑本质（不是只讲步骤）。完成例题、练习题预期的教学参数。注重介绍逻辑思维前沿、效果外化、新思想，开阔学员视野。学生能用自己的话复述核心概念。有层次递进和逻辑延伸。L7-L9额外：学生能独立分析题干、提炼解题模型。"
        criteria_good: "内容完整，阐述准确，但本质挖掘不足。学生能跟但理解深度不够。完成预期教学参数但拓展有限。有逻辑性，知识讲解清晰准确。L1-L3额外：能举例形象化讲清基础知识。"
        criteria_average: "按指南讲全知识点但无任何拓展。学生只会套步骤不会变通。具备基础逻辑但清晰度有待提升。能完成基础教学目标。L4-L6额外关注：是否照搬指南无自主讲解。"
        criteria_poor: "内容欠丰富，信息量一般。知识讲解不够清楚，未完成班型对应例题、练习题预期参数。教学中出现与学生学习目标不相关内容。知识性错误或严重遗漏核心知识点。"
        deduction_signals:
          - "教师连续5分钟以上单向讲授无提问 → 扣0.5-1分"
          - "学生回答'不知道'后教师直接给答案 → 扣0.5分"
          - "多次出现'就是这样的''记住就行了'等搪塞语 → 扣1分"
          - "出现知识性错误 → 本维度直接不合格"

      - name: 熟练程度
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "教材处理得当，内容安排合理，讲授自如，能结合自己的理解、思考和探索进行讲解。根据学生的反馈和学习进度，灵活调整教学内容。对所有题目滚瓜烂熟，精准串联知识点解题，讲解行云流水。应对学生非预期回答时不出错。"
        criteria_good: "能灵活应对常见问题，但复杂问题引导效率低。对常规题型熟练，挑战题偶有卡顿但能自我恢复节奏。功底良好，相对灵活处理教学进度。"
        criteria_average: "主要依靠固定话术，灵活性弱。能应对基础问题但引导机械。对常规题型熟练，挑战题/变形题处理生涩。功底合格，教学调整度低。"
        criteria_poor: "教材内容掌握不够熟练，讲解基本照本宣科。过分侧重理论而忽视实践。基础题目也讲解不流畅，出现明显知识漏洞。"
        deduction_signals:
          - "教师口误后无法自我纠正 → 扣1分"
          - "回避学生提出的超纲问题 → 扣0.5分"
          - "明显在念PPT/指南而非自主讲解 → 扣1.5分"

      - name: 重点难点
        category: 教学内容
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "明确课程的重点和难点，并通过多种不同的教学方法加以强调。精准把握重难点，用≥2种角度/方法突破（如举例+反例+类比+操作），非单一方法重复。突出重点，化解难点。难点讲解时间分配科学合理（难点应占课堂时间30%以上）。"
        criteria_good: "重难点突出，配合举例剖析难点，但本质挖掘不足，突破方式单一。学生听懂了但换题不会。有一定知识拓展和延伸举例。"
        criteria_average: "知识点讲全但重难点不突出。简单内容重点讲，难点一句带过。缺少拓展和延伸。时间分配头重脚轻。能识别难点但依赖指南解析思路，剖析浅显。"
        criteria_poor: "教学内容没有明确的重点，学生对关键概念理解不深刻。难点未能化解。无重点意识，全部内容平均分配时间。知识罗列而非有层次的教学。"
        deduction_signals:
          - "难点只讲一种解法就过 → 不得评优"
          - "学生答错后未用错题深化讲解 → 扣0.5分"

      # --- 第2类：教学方法（20分）---
      - name: 教学方式方法
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "提问启发：提问具有开放性和启发性，充分激发学生思考。方法多样：方法-题目-学生三者高度匹配，能根据学生差异快速调整讲法。反馈精准：学生答错后有针对性纠正而非笼统鼓励。提供及时具体的个性化反馈。思维渗透：引导过程注重思维方法渗透和方法提炼，能将解题技巧和思维方法强耦合并迁移应用。L1-L3额外：能设计趣味点、游戏化教学，让孩子高效参与。L7-L9额外：能根据学生反馈调整引导方向，鼓励自主质疑探究。"
        criteria_good: "提问：能完成关键提问，部分为开放式问题但数量有限、引导深度有限。方法：能切换不同讲法（如图形化、模型化），但复杂问题应变策略有限。反馈：较多样，能正向反馈但深度不够。思维：引导过程体现基础思维方法（如分类讨论、方程思想），但深度广度不足。L1-L3额外：有意识设计互动方式让孩子参与。"
        criteria_average: "提问：多为'是不是''对不对'等封闭式问题，引导方向单一。方法：依赖常规讲授法，遇学生理解偏差时调整方式单一（如重复讲解）。反馈：以'很好''不错'等笼统词为主，缺少针对性。思维：仅完成基本解法讲解，无法体现思维方法。L4-L6额外关注：是否只有讲授无自主探究。"
        criteria_poor: "过分依赖单一的教学方法。教学计划和方法僵化。不鼓励学生进行深入思考和讨论。学生在答错题后没有了解到正确答案或解题思路。方法僵化，完全无法调整。无任何思维方法渗透。L1-L3：提问完全封闭，无法激发幼儿思考和表达。"
        deduction_signals:
          - "学生提出非预期解法但教师忽略/打断 → 扣1.5分，本维度封顶良"
          - "教师反复说'按我说的来''先别管那个' → 扣1分"
          - "全堂课只使用一种教学方法 → 不得超7分"
          - "全堂无任何学生自主探究环节 → 不得评优"
          - "封闭式问题占比超80% → 不得评优"
          - "学生答错后教师不给正确答案/解题思路 → 扣1分"

      - name: 教学逻辑
        category: 教学方法
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "突出主线，脉络清晰，逻辑性强。教学弹性好——能根据学生反应灵活调整推理路径。思维尊重度高——主动追问学生'你怎么想的'，肯定非预期思路。学生能模仿思路举一反三。逻辑链完整，能拆解复杂题型。"
        criteria_good: "主线清楚但衔接略显生硬。教学弹性一般——能在固定路径上做小幅调整。容许学生表达不同想法但不深入引导。引导过程体现基础思维方法但深度广度不足。"
        criteria_average: "有主线但经常跑偏。教学弹性差——只会按既定路线走，不接纳学生不同思路。打断/否定学生的不同想法，强行拉回既定路径。按部就班讲解解题步骤，仅关注答案对错，忽略解题思路形成和思维误区梳理。"
        criteria_poor: "课程内容没有明确的组织结构。没有给出明确的指导和步骤。提供过多的信息，没有有效地筛选和组织。无逻辑可言，讲解混乱。"
        # 子维度评分（在Prompt中要求LLM分别评估）
        sub_dimensions:
          - name: "主线清晰度"
            weight: 0.40
            description: "教学脉络是否清晰，环节衔接是否自然，推理链是否完整"
          - name: "教学弹性"
            weight: 0.30
            description: "当学生回答偏离预设路径时，教师能否灵活调整。优=主动追问学生思路并据此调整；中=只按既定路线走，不接纳不同思路；差=打断/否定学生不同想法强行拉回"
          - name: "思维尊重"
            weight: 0.30
            description: "教师是否尊重学生的思维过程。优=鼓励表达不同想法，即使错误也先肯定再引导；中=容许表达但不深入引导；差=打断/否定/忽视学生不同想法"
        deduction_signals:
          - "教师存在'打断学生思路'或'强行按既定方法讲'的行为 → 教学弹性+思维尊重合计不得超12分(满分20)"
          - "学生沉默后教师施压式追问(如'是家长不在吗？') → 思维尊重不得超5分(满分10)"
          - "全程无学生自主探究环节 → 教学弹性封顶良"

      # --- 第3类：教学规范（35分）---
      - name: 组织教学
        category: 教学规范
        weight: 0.10
        max_score: 10
        score_ranges:
          excellent: "[9,10]"
          good: "[7,9)"
          average: "[1,7)"
          poor: "[0,1)"
        criteria_excellent: "制定并清晰地传达课堂规则和期望。合理规划课堂时间，确保教学活动有序进行。鼓励学生积极参与。在紧急情况或突发事件中保持冷静。规则执行一致，不双标。课堂节奏张弛有度，给学生足够的思考时间和空间。L1-L3额外：精准把控节奏，创造性运用各种教学方法使课堂有活力。"
        criteria_good: "基本规则明确，时间管理合理。能按参数控制课堂节奏，偶有紧迫感。规则基本明确但执行偶有松懈。结合学生理解情况可灵活处理节奏。"
        criteria_average: "规则模糊或执行不一。节奏平铺直叙，缺乏变化。课堂纪律松散但不严重影响教学。按基础参数完成教学但把控生硬。"
        criteria_poor: "没有明确的课堂规则或未能清晰传达课堂纪律。课堂时间管理混乱。未能营造积极的课堂氛围。在突发事件中反应迟缓。课堂失控。节奏混乱，环节衔接不畅。"
        deduction_signals:
          - "开课超过3分钟未进入教学 → 扣0.5分"
          - "下课拖延超过5分钟 → 扣0.5分"
          - "对不同学生执行纪律标准不一致 → 扣1分"
          - "L1-L3: 未作任何课堂规则提醒 → 扣0.5分"

      # 视觉维度（由视觉模型qwen-vl-max评分，文本模型不评）
      - name: 仪表教态
        category: 教学规范
        weight: 0.05
        max_score: 5
        is_visual: true
        score_ranges:
          excellent: "[4,5]"
          good: "[3,4)"
          average: "[1,3)"
          poor: "[0,1)"
        criteria_excellent: "着装符合职业教学标准。课堂上教师表现出自信的姿态。使用积极的肢体语言，表情丰富。语气温和坚定，非命令式。"
        criteria_good: "仪表得体规范。姿态自信但语气偏硬或偏软。有一定肢体语言但不够丰富。"
        criteria_average: "仪表一般。语气生硬/命令式。对学生的态度有明显温差（对积极学生热情，对沉默学生冷漠）。"
        criteria_poor: "着装不符合标准。在课堂上表现出消极的姿态。使用封闭的肢体语言。表现出不专业的行为。明显不当言行/语气。"
        deduction_signals:
          - "对沉默学生使用施加压力的话语（如'是家长又不在了吗？'）→ 扣1分"
          - "语气温冷/催促（'快点''别磨蹭'）→ 扣0.5分"
          - "对积极学生热情但对沉默学生冷漠 → 扣1分（温差效应）"

      # 视觉维度（由视觉模型评分）
      - name: 语言表达及板书设计
        category: 教学规范
        weight: 0.05
        max_score: 5
        is_visual: true
        score_ranges:
          excellent: "[4,5]"
          good: "[3,4)"
          average: "[1,3)"
          poor: "[0,1)"
        criteria_excellent: "准确、生动、流畅、语速适当、普通话标准。课件与板书布局合理、字迹工整、图标清楚。逻辑清晰、简洁、重点突出。数学语言精准严谨（如'必然''可能'等用语准确）。板书帮助学生构建知识框架而非简单抄写结论。"
        criteria_good: "表达流畅有条理，偶有数学语言表达不精准。整体结构较清晰但感染力一般。板书清晰，条理较好但不够结构化。"
        criteria_average: "语言表达以复述指南为主，感染力中规中矩。偶有口误。需要板书呈现时无板书，或板书内容杂乱、基础不规范。"
        criteria_poor: "语言表达含糊不清，普通话不标准。语速过快或过慢。书写潦草、内容复杂、布局混乱。口误频繁。板书混乱或缺失。"
        deduction_signals:
          - "数学术语使用明显错误（如混淆'必然'和'可能'）→ 扣1分"
          - "全堂课无任何板书/课件呈现 → 不得超3分"

      - name: 关注公平
        category: 教学规范
        weight: 0.15
        max_score: 15
        score_ranges:
          excellent: "[13,15]"
          good: "[9,13)"
          average: "[3,9)"
          poor: "[0,3)"
        criteria_excellent: "分布：每位学员≥2次有效单独互动，上台差距≤1。反馈：给予所有学生及时、具体、建设性的反馈（个性化反馈，不是笼统的「很好」）。加星有理有据。关怀：主动设计让沉默学生参与的方式（如指定回答简单题）。L1-L3额外：能结合学生表情/状态预判并立刻关注，热情真诚反馈。互动形式多样（游戏/角色扮演/轮流发言）。"
        criteria_good: "分布：多数学生≥2次有效互动，关注多数学生并互动。互动机会差距≤2。反馈：反馈较具体但偶尔笼统。关怀：会点名沉默学生但方式较生硬。L1-L3：能照顾多数学生，用游戏等方式让全班轮流发言；有固定激励套路。"
        criteria_average: "分布：部分学生0-1次互动，互动机会差距≥3。容易集中关注积极/基础好的学生，对沉默/基础弱学生关注少。反馈：以'很好''不错'等笼统词为主。关怀：连续追问沉默学生造成压力。互动形式单一（多为问答），缺乏多样性。"
        criteria_poor: "教师在课堂互动中表现出对某些学生的明显偏爱。个别学生被完全忽视。同一学生连续3次以上被第一个/最后一个点名互动。缺乏正向反馈。"
        # 子维度评分
        sub_dimensions:
          - name: "互动机会分布"
            weight: 0.40
            description: "每位学生的单独互动次数是否均衡。优=每位≥2次有效互动，上台差距≤1；良=多数≥2次，差距≤2；中=部分0-1次，差距≥3；差=明显偏心，个别学生被完全忽视"
          - name: "反馈质量"
            weight: 0.30
            description: "对每位学生的反馈是否个性化、有针对性。优=每条反馈针对该学生的具体回答，加星有理有据；良=反馈较具体但偶尔笼统；中=以'很好''不错'等笼统词为主；差=无反馈或反馈无效"
          - name: "沉默学生关怀"
            weight: 0.30
            description: "对沉默/内向学生的关怀方式和质量。优=主动设计让沉默学生参与的方式（如指定回答简单题、耐心等待）；良=点名但不生硬；中=连续追问造成压力；差=完全忽视"
        deduction_signals:
          - "同一学生连续3次以上被第一个/最后一个点名互动 → 扣2分"
          - "对沉默学生连续追问而非耐心等待 → 沉默关怀封顶待改进"
          - "表扬用语90%以上为'很好''太棒了'等无差别词 → 反馈质量封顶良"
          - "存在学生0-1次互动 → 关注公平总分不得超9分(满分15)"
          - "学生被连续追问后出现沉默/哭泣等负面反应 → 扣1.5分"

      # --- 第4类：课堂教学效果（15分）---
      - name: 课堂效果及整体印象
        category: 课堂教学效果
        weight: 0.15
        max_score: 15
        score_ranges:
          excellent: "[13,15]"
          good: "[9,13)"
          average: "[3,9)"
          poor: "[0,3)"
        criteria_excellent: "达成：所有学生达标且能迁移应用。学生面对综合难题有思考有想法。教师重视知识整理，课上会带着学生归纳、串联知识点。氛围：学生主动提问/探究，气氛活跃，课堂吸引力强。思维：学生展示了批判性思维/问题解决能力。效果外化：能将教学内容与生活实际、校内其他学科进行有机融合，形成系统知识体系。L1-L3额外：课堂生成高质量学生笔记/思维导图，孩子能将知识关联到生活场景。L4-L6额外：学生能举一反三，拓展部分吸收较好。"
        criteria_good: "达成：多数学生达标。教师能有意识引导学生规范整理知识要点。氛围：学生被动但配合，气氛平和。思维：学生能按引导思考。效果外化：偶尔关联校内及奥数知识体系。教学目标达成度高，学生能表达清晰。"
        criteria_average: "达成：部分学生达标。教学目标基本完成但高阶理解不足。氛围：气氛沉闷，学生被动跟随。思维：学生只给出答案无思考过程。效果外化：很少有课程效果外化的意识，只关注当堂表现。"
        criteria_poor: "达成：多数学生未达标。课堂练习未达标，对知识理解严重不足。氛围：课堂冷场，学生明显抗拒，参与度低。思维：学生无思考表现。教师未能提供足够学习指导。教学活动未能有效帮助学生达到学习目标。"
        # 子维度评分
        sub_dimensions:
          - name: "学习目标达成"
            weight: 0.35
            description: "学生是否实际掌握了教学目标。优=所有学生达标且能迁移应用；良=多数学生达标；中=部分学生达标；差=多数学生未达标"
          - name: "课堂氛围"
            weight: 0.35
            description: "课堂的整体气氛和学生的参与状态。优=学生主动提问/探究，气氛活跃；良=学生被动但配合，气氛平和；中=气氛沉闷，学生被动跟随；差=课堂冷场，学生明显抗拒"
          - name: "思维培养"
            weight: 0.30
            description: "学生的思维过程是否可见、是否被培养。优=学生展示了批判性思维/问题解决能力；良=学生能按引导思考；中=学生只给出答案无思考过程；差=学生无思考表现"

    quality_checklist:
      - "有无开场白和课堂纪律提醒"
      - "是否按时上下课"
      - "互动环节是否有学生参与"
      - "是否有知识总结"
      - "有无不当言论"
      - "仪表教态是否规范"
      - "语言表达及板书设计是否合理"
      - "是否关注到每位学生（无学生被忽视）"
      - "是否有思维方法渗透和迁移应用"
      - "是否有课程效果外化意识"

